<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>One Small Question 💗</title>

  <link rel="stylesheet" href="css/main.css" />
  <script src="js/main.js" defer></script>
</head>

<body>
  <div class="page">
    <div class="card">
      <h1 class="title">Do you want a surprise? 💖</h1>
      <p class="subtitle">Quick question. Zero pressure. Maximum cute.</p>

      <div class="gifWrap">
        <img class="gif"
          src="https://github.com/KN1GHTW1NG/16March/raw/refs/heads/main/assets/IMG_2117.gif"
          alt="Surprise cat gif">
      </div>

      <div class="btnRow">
        <button class="pill primary" id="yesBtn">Yes 😼</button>
        <button class="pill ghost" id="noBtn">No 🙃</button>
      </div>

      <p class="hint">Tip: iPhone sometimes needs a tap first for sounds later — you’re good.</p>
    </div>
  </div>
</body>
</html>
