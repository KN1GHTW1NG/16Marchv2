<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sad Cat Council 😿</title>

  <link rel="stylesheet" href="css/main.css" />
  <script src="js/main.js" defer></script>
</head>

<body>
  <div class="page">
    <div class="card">
      <h1 class="title">The Decision Has Been Recorded 😿</h1>

      <p class="subtitle">
        The committee (one emotionally invested cat) has reviewed your choice.<br>
        Conclusion: slightly tragic… but respectfully accepted. 🫡
      </p>

      <div class="gifWrap">
        <img class="gif"
          src="assets/IMG_2126.gif"
          alt="Sad cat gif">
      </div>

      <div class="btnRow">
        <button class="pill primary" id="retryBtn">Alright… let’s see it 😅</button>
        <button class="pill ghost" id="comebackBtn">Go back calmly</button>
      </div>

      <p class="hint">No pressure. Just mild feline disappointment.</p>
    </div>
  </div>
</body>
</html>
